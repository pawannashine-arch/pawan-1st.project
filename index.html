<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Lending Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Library Lending System</h1>
</header>

<div class="container">
    <h2>Issue Book</h2>
    <form id="lendingForm">
        <label>Student Name:</label>
        <input type="text" id="studentName" required>

        <label>Book Title:</label>
        <input type="text" id="bookTitle" required>

        <label>Issue Date:</label>
        <input type="date" id="issueDate" required>

        <label>Return Date:</label>
        <input type="date" id="returnDate" required>

        <button type="submit">Issue Book</button>
    </form>

    <h2>Issued Books</h2>
    <table id="recordsTable">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Book Title</th>
                <th>Issue Date</th>
                <th>Return Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const form = document.getElementById("lendingForm");
    const tableBody = document.querySelector("#recordsTable tbody");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const name = document.getElementById("studentName").value;
        const book = document.getElementById("bookTitle").value;
        const issue = document.getElementById("issueDate").value;
        const returnDate = document.getElementById("returnDate").value;

        const row = `<tr>
            <td>${name}</td>
            <td>${book}</td>
            <td>${issue}</td>
            <td>${returnDate}</td>
        </tr>`;

        tableBody.innerHTML += row;

        form.reset();
    });
</script>

</body>
</html>
